  <g
     transform="translate(90,350)"
     id="g1686">
    <rect
       width="500"
       height="140"
       class="box"
       id="rect1672" />
    <text
       x="16"
       y="26"
       class="note"
       id="text1674">features[n]:</text>
    <text
       x="32"
       y="52"
       class="note"
       id="text1676">- id, bbox, (mini)geometry</text>
    <text
       x="32"
       y="78"
       class="note"
       id="text1678">- properties: display_name, highlight, score</text>
    <text
       x="32"
       y="104"
       class="note"
       id="text1680">- properties.href[]: URL(s) naar volledige feature</text>
    <!-- caret en plus zoals in tekst -->
